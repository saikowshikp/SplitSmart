{% extends "base.html" %}

{% block content %}

<div class="card">

<h1>Create Group</h1>

<form method="POST"
      action="{{ url_for('group.creategroup') }}">

    <label>Group Name</label>

    <input
        type="text"
        name="groupname"
        required>

    <button type="submit">
        Create Group
    </button>

</form>

</div>

{% endblock %}
