{% extends "base.html" %}

{% block content %}

<h1>{{ group.name }}</h1>

<details>
    <summary>Show Group Members</summary>

    <ul>
        {% for member in group.members %}
            <li>
                {% if member.user.id == group.created_by %}
                    <strong>{{ member.user.name }} (Created Group)</strong>
                {% else %}
                    {{ member.user.name }}
                {% endif %}
            </li>
        {% endfor %}
    </ul>

</details>

{% endblock %}
