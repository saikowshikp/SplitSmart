{% extends "base.html" %}

{% block content %}

<h1>Join an existing Group</h1>

<form method="POST" action="{{ url_for('group.joingroup') }}">

    <label for="group_id">Enter Group ID:</label>
    <input 
        type="number" 
        id="group_id" 
        name="group_id" 
        required
    >

    <br><br>

    <button type="submit">Join Group</button>

</form>

{% endblock %}
