{% extends "base.html" %}

{% block content %}

<div class="card">

    <h1>Join Group</h1>

    <form method="POST"
          action="{{ url_for('group.joingroup') }}">

        {{ form.hidden_tag() }}

        <div>

            {{ form.group_id.label }}

            {{ form.group_id(
                class="form-control",
                placeholder="Enter Group ID"
            ) }}

            {% for error in form.group_id.errors %}
                <p class="error">
                    {{ error }}
                </p>
            {% endfor %}

        </div>

        <button type="submit">
            {{ form.submit.label.text }}
        </button>

    </form>

</div>

{% endblock %}
