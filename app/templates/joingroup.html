{% extends "base.html" %}

{% block content %}

<div class="card">

<h1>Join Group</h1>

<form method="POST"
      action="{{ url_for('group.joingroup') }}">

    <label>Group ID</label>

    <input
        type="number"
        name="group_id"
        required>

    <button type="submit">
        Join Group
    </button>

</form>

</div>

{% endblock %}
