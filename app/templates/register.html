{% extends "base.html" %}

{% block content %}

<h2>Register</h2>

<form method="POST">

    <input
        name="name"
        placeholder="Name"
        required>

    <br><br>

    <input
        type="email"
        name="email"
        placeholder="Email"
        required>

    <br><br>

    <input
        type="password"
        name="password"
        placeholder="Password"
        required>

    <br><br>

    <button type="submit">Register</button>

</form>

<br>

<a href="/login">Login</a>

{% endblock %}
