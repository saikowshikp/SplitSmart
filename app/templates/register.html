{% extends "base.html" %}

{% block content %}

<div class="card auth-card">

<h2>Register</h2>

<form method="POST">

    <input
        name="name"
        placeholder="Name"
        required>

    <input
        type="email"
        name="email"
        placeholder="Email"
        required>

    <input
        type="password"
        name="password"
        placeholder="Password"
        required>

    <button type="submit">
        Register
    </button>

</form>

<p>
    Already have an account?
    <a href="/login">Login</a>
</p>

</div>

{% endblock %}
